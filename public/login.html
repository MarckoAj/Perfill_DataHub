<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfill DataHub - Autenticação</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --error: #ef4444;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        .login-container {
            display: flex;
            width: 1000px;
            height: 600px;
            background: var(--surface);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05), 0 1px 3px rgba(0,0,0,0.05);
            overflow: hidden;
            position: relative;
        }

        .illustration-side {
            flex: 1.2;
            background-color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            border-right: 1px solid var(--border);
        }

        .illustration-side img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            /* Neumorphism subtle shadow effect on image container */
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.03));
        }

        .form-side {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .form-header {
            margin-bottom: 40px;
        }

        .form-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #2563eb, #10b981);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-header p {
            color: var(--text-muted);
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s ease;
            background: #f8fafc;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        .message.error {
            background: #fef2f2;
            color: var(--error);
            display: block;
        }

        .message.success {
            background: #ecfdf5;
            color: var(--success);
            display: block;
        }

        /* Password Change View */
        #password-change-view {
            display: none;
        }

        .password-requirements {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
        }
        
        @media (max-width: 900px) {
            .login-container {
                flex-direction: column;
                width: 100%;
                height: 100vh;
                border-radius: 0;
            }
            .illustration-side {
                display: none; /* Esconde ilustração no mobile para focar no login */
            }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="illustration-side">
            <img src="./images/login_illustration.png" alt="Perfill Tecnologia Integrações">
        </div>

        <div class="form-side">
            <!-- View de Login Normal -->
            <div id="login-view">
                <div class="form-header">
                    <h1>Bem-vindo</h1>
                    <p>Faça login para acessar o DataHub</p>
                </div>

                <form id="login-form">
                    <div class="form-group">
                        <label for="username">Usuário (E-mail ou Login AUVO)</label>
                        <input type="text" id="username" required placeholder="Digite seu usuário">
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" required placeholder="Sua senha">
                    </div>

                    <button type="submit" class="btn-submit" id="btn-login">Entrar</button>
                    <div id="login-message" class="message"></div>
                </form>
            </div>

            <!-- View de Troca de Senha -->
            <div id="password-change-view">
                <div class="form-header">
                    <h1>Atualizar Senha</h1>
                    <p>Por motivos de segurança, você precisa atualizar sua senha padrão.</p>
                </div>

                <form id="change-password-form">
                    <div class="form-group">
                        <label for="new-password">Nova Senha</label>
                        <input type="password" id="new-password" required placeholder="Digite a nova senha">
                        <div class="password-requirements">Recomendamos utilizar caracteres especiais.</div>
                    </div>
                    
                    <div class="form-group">
                        <label for="confirm-password">Confirmar Nova Senha</label>
                        <input type="password" id="confirm-password" required placeholder="Repita a nova senha">
                    </div>

                    <button type="submit" class="btn-submit" id="btn-change">Atualizar e Entrar</button>
                    <button type="button" class="btn-submit" style="background: transparent; color: var(--text-muted); box-shadow: none; margin-top: 0; padding-top: 8px;" onclick="cancelChange()">Voltar</button>
                    <div id="change-message" class="message"></div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const loginView = document.getElementById('login-view');
        const passwordChangeView = document.getElementById('password-change-view');
        
        const loginForm = document.getElementById('login-form');
        const changeForm = document.getElementById('change-password-form');
        
        let currentUser = '';
        let currentOldPassword = '';

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const msgBox = document.getElementById('login-message');
            
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            
            btn.disabled = true;
            btn.innerText = 'Autenticando...';
            msgBox.className = 'message';
            msgBox.innerText = '';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Falha ao autenticar');
                }

                if (data.requirePasswordChange) {
                    currentUser = user;
                    currentOldPassword = pass;
                    
                    loginView.style.display = 'none';
                    passwordChangeView.style.display = 'block';
                    document.getElementById('new-password').focus();
                } else if (data.token) {
                    localStorage.setItem('authToken', data.token);
                    window.location.href = '/panel/glpi-dashboard.html'; 
                }

            } catch (error) {
                msgBox.className = 'message error';
                msgBox.innerText = error.message;
            } finally {
                btn.disabled = false;
                btn.innerText = 'Entrar';
            }
        });

        changeForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-change');
            const msgBox = document.getElementById('change-message');
            
            const newPass = document.getElementById('new-password').value;
            const confirmPass = document.getElementById('confirm-password').value;
            
            msgBox.className = 'message';
            
            if (newPass.length < 6) {
                msgBox.className = 'message error';
                msgBox.innerText = 'A senha deve ter pelo menos 6 caracteres.';
                return;
            }

            if (newPass !== confirmPass) {
                msgBox.className = 'message error';
                msgBox.innerText = 'As senhas não coincidem.';
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Atualizando...';

            try {
                const response = await fetch('/api/auth/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username: currentUser, 
                        oldPassword: currentOldPassword,
                        newPassword: newPass
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Falha ao atualizar senha');
                }

                msgBox.className = 'message success';
                msgBox.innerText = 'Senha atualizada! Redirecionando...';

                if (data.token) {
                    localStorage.setItem('authToken', data.token);
                    setTimeout(() => {
                        window.location.href = '/panel/glpi-dashboard.html';
                    }, 1500);
                }

            } catch (error) {
                msgBox.className = 'message error';
                msgBox.innerText = error.message;
                btn.disabled = false;
                btn.innerText = 'Atualizar e Entrar';
            }
        });

        function cancelChange() {
            currentUser = '';
            currentOldPassword = '';
            loginView.style.display = 'block';
            passwordChangeView.style.display = 'none';
            document.getElementById('password').value = '';
        }
    </script>
</body>
</html>
