<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Login - Perfill BI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .pf-login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 140px);
    }
    .pf-login-card {
      background-color: var(--pf-bg-card);
      border: 1px solid var(--pf-border-soft);
      border-radius: var(--pf-radius-card);
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }
    .pf-login-title {
      color: var(--pf-text);
      font-size: 1.5rem;
      font-weight: 600;
      margin-top: 0;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    .pf-form-group {
      margin-bottom: 1rem;
    }
    .pf-form-label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--pf-text-muted);
      font-size: 0.875rem;
      font-weight: 500;
    }
    .pf-form-input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--pf-border-soft);
      border-radius: 8px;
      background-color: rgba(255, 255, 255, 0.05); /* Ligeiramente mais claro que o card */
      color: var(--pf-text);
      font-family: inherit;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    .pf-form-input:focus {
      outline: none;
      border-color: var(--pf-primary);
    }
    .pf-login-button {
      width: 100%;
      margin-top: 1rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
    }
    .pf-error-message {
      color: var(--pf-error);
      font-size: 0.875rem;
      margin-top: 1rem;
      text-align: center;
      display: none;
    }
    .loader {
      border: 2px solid rgba(255,255,255,0.3);
      border-top: 2px solid white;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      animation: spin 1s linear infinite;
      display: none;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="pf-body">
  <header class="pf-header">
    <div class="pf-header-left">
      <div class="pf-logo">Perfill</div>
      <span class="pf-header-title">Autenticação Restrita</span>
    </div>
    <nav class="pf-nav">
      <a href="/index.html" class="pf-nav-link">Guia</a>
      <a href="/login.html" class="pf-nav-link pf-nav-link--active">Chamados</a>
    </nav>
  </header>

  <main class="pf-main">
    <div class="pf-login-container">
      <div class="pf-login-card">
        <h2 class="pf-login-title">Acesso ao Dashboard</h2>
        <form id="loginForm">
          <div class="pf-form-group">
            <label class="pf-form-label" for="username">Usuário</label>
            <input type="text" id="username" class="pf-form-input" required autocomplete="username" />
          </div>
          <div class="pf-form-group">
            <label class="pf-form-label" for="password">Senha</label>
            <input type="password" id="password" class="pf-form-input" required autocomplete="current-password" />
          </div>
          <div id="errorMessage" class="pf-error-message">Usuário ou senha incorretos.</div>
          <button type="submit" class="pf-button pf-login-button" id="submitBtn">
            <span>Entrar</span>
            <div class="loader" id="loader"></div>
          </button>
        </form>
      </div>
    </div>
  </main>

  <script>
    if (localStorage.getItem("token")) {
      window.location.href = "/chamados.html";
    }

    const form = document.getElementById("loginForm");
    const errorMsg = document.getElementById("errorMessage");
    const submitBtn = document.getElementById("submitBtn");
    const loader = document.getElementById("loader");
    const btnText = submitBtn.querySelector("span");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;
      
      errorMsg.style.display = "none";
      submitBtn.disabled = true;
      btnText.style.display = "none";
      loader.style.display = "block";

      try {
        const response = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.error || "Erro na autenticação.");

        localStorage.setItem("token", data.token);
        window.location.href = "/chamados.html";
      } catch (error) {
        errorMsg.textContent = error.message;
        errorMsg.style.display = "block";
      } finally {
        submitBtn.disabled = false;
        btnText.style.display = "block";
        loader.style.display = "none";
      }
    });
  </script>
</body>
</html>
