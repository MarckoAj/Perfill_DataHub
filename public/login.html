<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfill DataHub - Autenticação</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-hover: #059669;
            --bg-deep: #020617;
            --glass: rgba(15, 23, 42, 0.15);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --error: #ef4444;
            --success: #10b981;

            /* Cores Plataformas */
            --color-auvo: #8b5cf6;
            --color-zabbix: #ef4444;
            --color-glpi: #3b82f6;
            --color-pbi: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Fundo Minimalista: Vortex Limpo */
        .bg-vortex {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #020617 url('./images/login_Vortex_GPT.png') no-repeat center center;
            background-size: cover;
            filter: brightness(1.0) contrast(1.1);
            z-index: 1;
        }

        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Escurecendo o centro para destacar o formulário */
            background: radial-gradient(circle at center, rgba(2, 6, 23, 0.4) 0%, rgba(2, 6, 23, 0.9) 100%);
            z-index: 2;
        }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 900px;
            height: 550px;
            display: flex;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.1);
        }

        .branding-side {
            flex: 1.2;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: transparent;
            border-right: 1px solid var(--glass-border);
            text-align: center;
        }

        .branding-side img {
            height: 220px;
            margin-bottom: 20px;
            object-fit: contain;
            filter: drop-shadow(0 0 40px rgba(16, 185, 129, 0.3));
        }

        .branding-side h2 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, #10b981, #34d399);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .branding-side p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 10px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .form-side {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-header {
            margin-bottom: 35px;
        }

        .form-header h3 {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
        }

        .form-header p {
            font-size: 14px;
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--primary);
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: #ffffff;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 10px;
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(16, 185, 129, 0.5);
        }

        .message {
            margin-top: 25px;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            display: none;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            display: block;
        }

        .message.success {
            background: rgba(16, 185, 129, 0.1);
            color: #4ade80;
            display: block;
        }

        #password-change-view {
            display: none;
        }

        @media (max-width: 850px) {
            .login-container {
                flex-direction: column;
                height: auto;
                max-width: 400px;
            }

            .branding-side {
                padding: 40px 20px;
            }

            .form-side {
                padding: 40px 30px;
            }

            .platform-node {
                display: none;
            }

            /* Esconde nós no mobile para foco no login */
        }
    </style>
</head>

<body>

    <div class="bg-vortex"></div>
    <div class="bg-overlay"></div>

    <div class="login-container">
        <div class="branding-side">
            <img src="perfill_logo.png" alt="Perfill Tecnologia">
            <h2>Data Hub</h2>
            <p>Integração e Inteligência</p>
        </div>

        <div class="form-side">
            <div id="login-view">
                <div class="form-header">
                    <h3>Bem-vindo</h3>
                    <p>Acesse seu painel operacional</p>
                </div>

                <form id="login-form">
                    <div class="form-group">
                        <label for="username">Usuário</label>
                        <input type="text" id="username" required placeholder="Digite seu usuário">
                    </div>

                    <div class="form-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" required placeholder="••••••••">
                    </div>

                    <button type="submit" class="btn-submit" id="btn-login">Acessar Hub</button>
                    <div id="login-message" class="message"></div>
                </form>
            </div>

            <div id="password-change-view">
                <div class="form-header">
                    <h3>Nova Senha</h3>
                    <p>Atualize suas credenciais</p>
                </div>

                <form id="change-password-form">
                    <div class="form-group">
                        <label for="new-password">Nova Senha</label>
                        <input type="password" id="new-password" required placeholder="Digite a nova senha">
                    </div>

                    <div class="form-group">
                        <label for="confirm-password">Confirmar</label>
                        <input type="password" id="confirm-password" required placeholder="Repita a nova senha">
                    </div>

                    <button type="submit" class="btn-submit" id="btn-change">Salvar e Entrar</button>
                    <button type="button" class="btn-submit"
                        style="background: transparent; color: var(--text-muted); box-shadow: none; margin-top: 0;"
                        onclick="cancelChange()">Voltar</button>
                    <div id="change-message" class="message"></div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const loginView = document.getElementById('login-view');
        const passwordChangeView = document.getElementById('password-change-view');
        const loginForm = document.getElementById('login-form');
        const changeForm = document.getElementById('change-password-form');

        let currentUser = '';
        let currentOldPassword = '';

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const msgBox = document.getElementById('login-message');
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;

            btn.disabled = true;
            btn.innerText = 'Autenticando...';
            msgBox.className = 'message';
            msgBox.innerText = '';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await response.json();
                console.log('Resposta do Login:', { ok: response.ok, data });
                
                if (!response.ok) throw new Error(data.error || 'Falha ao autenticar');

                if (data.requirePasswordChange) {
                    currentUser = user;
                    currentOldPassword = pass;
                    loginView.style.display = 'none';
                    passwordChangeView.style.display = 'block';
                } else if (data.token) {
                    localStorage.setItem('authToken', data.token);
                    window.location.href = '/';
                }

            } catch (error) {
                msgBox.className = 'message error';
                msgBox.innerText = error.message;
            } finally {
                btn.disabled = false;
                btn.innerText = 'Acessar Hub';
            }
        });

        changeForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-change');
            const msgBox = document.getElementById('change-message');
            const newPass = document.getElementById('new-password').value;
            const confirmPass = document.getElementById('confirm-password').value;

            if (newPass.length < 6) {
                msgBox.className = 'message error';
                msgBox.innerText = 'Mínimo 6 caracteres.';
                return;
            }
            if (newPass !== confirmPass) {
                msgBox.className = 'message error';
                msgBox.innerText = 'Senhas não coincidem.';
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Salvando...';

            try {
                const response = await fetch('/api/auth/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: currentUser,
                        oldPassword: currentOldPassword,
                        newPassword: newPass
                    })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Erro ao trocar senha');

                msgBox.className = 'message success';
                msgBox.innerText = 'Sucesso! Entrando...';

                if (data.token) {
                    localStorage.setItem('authToken', data.token);
                    setTimeout(() => window.location.href = '/', 1500);
                }

            } catch (error) {
                msgBox.className = 'message error';
                msgBox.innerText = error.message;
                btn.disabled = false;
                btn.innerText = 'Salvar e Entrar';
            }
        });

        function cancelChange() {
            loginView.style.display = 'block';
            passwordChangeView.style.display = 'none';
        }
    </script>
</body>

</html>
