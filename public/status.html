<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <title>Perfill GLPI - Status do Servidor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/styles.css" />
    <style>
        .pf-status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .pf-status-card {
            text-align: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .pf-status-indicator {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: inline-block;
            margin-bottom: 0.5rem;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .pf-status-indicator--up {
            background-color: #4ade80;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.4);
        }

        .pf-status-indicator--down {
            background-color: var(--pf-error);
            box-shadow: 0 0 15px rgba(255, 77, 79, 0.4);
        }

        .pf-status-indicator--loading {
            background-color: var(--pf-warning, #f59e0b);
            animation: pfPulse 1s infinite alternate;
        }

        @keyframes pfPulse {
            from { opacity: 0.6; }
            to { opacity: 1; transform: scale(1.1); }
        }

        .pf-uptime-text {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, #19c5ff, #007bff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 1rem 0;
        }
    </style>
</head>

<body class="pf-body">
    <header class="pf-header">
        <div class="pf-header-left">
            <div class="pf-logo">Perfill</div>
            <span class="pf-header-title">Status e Monitoramento</span>
        </div>
        <nav class="pf-nav">
            <a href="/chamados.html" class="pf-nav-link">Dashboard</a>
        </nav>
    </header>

    <main class="pf-main">
        <section class="pf-card" style="text-align: center; padding: 2.5rem;">
            <p style="color: var(--pf-text-secondary); margin-bottom: 0;">Tempo de Atividade (Uptime)</p>
            <div id="uptimeDisplay" class="pf-uptime-text">00d 00h 00m 00s</div>
            <p class="pf-hint" id="serverTime" style="margin-top: 0;">Carregando...</p>
        </section>

        <div class="pf-status-grid">
            <!-- card live -->
            <div class="pf-card pf-status-card">
                <span id="liveIndicator" class="pf-status-indicator pf-status-indicator--loading"></span>
                <h3 style="margin: 0.5rem 0;">Processo (Live)</h3>
                <p id="liveText" style="color: var(--pf-text-secondary); font-size: 0.9rem;">Verificando...</p>
            </div>

            <!-- card health -->
            <div class="pf-card pf-status-card">
                <span id="healthIndicator" class="pf-status-indicator pf-status-indicator--loading"></span>
                <h3 style="margin: 0.5rem 0;">API (Health)</h3>
                <p id="healthText" style="color: var(--pf-text-secondary); font-size: 0.9rem;">Verificando...</p>
            </div>

            <!-- card ready (Database) -->
            <div class="pf-card pf-status-card">
                <span id="readyIndicator" class="pf-status-indicator pf-status-indicator--loading"></span>
                <h3 style="margin: 0.5rem 0;">Banco de Dados (Ready)</h3>
                <p id="readyText" style="color: var(--pf-text-secondary); font-size: 0.9rem;">Verificando...</p>
            </div>
        </div>
    </main>

    <script>
        function formatUptime(seconds) {
            if (!seconds && seconds !== 0) return "00d 00h 00m 00s";
            const d = Math.floor(seconds / (3600 * 24));
            const h = Math.floor((seconds % (3600 * 24)) / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);

            const dStr = d.toString().padStart(2, '0') + 'd';
            const hStr = h.toString().padStart(2, '0') + 'h';
            const mStr = m.toString().padStart(2, '0') + 'm';
            const sStr = s.toString().padStart(2, '0') + 's';

            return `${dStr} ${hStr} ${mStr} ${sStr}`;
        }

        async function updateStatus() {
            // 1. Live Check
            try {
                const res = await fetch("/live");
                const data = await res.json();
                
                document.getElementById("liveIndicator").className = "pf-status-indicator pf-status-indicator--up";
                document.getElementById("liveText").textContent = data.status === "UP" ? "Ativo e Rodando" : "Instável";
                
                // Atualiza Uptime
                if (data.uptime !== undefined) {
                    document.getElementById("uptimeDisplay").textContent = formatUptime(data.uptime);
                    document.getElementById("serverTime").textContent = `Última verificação: ${new Date(data.timestamp).toLocaleTimeString()}`;
                }
            } catch (e) {
                document.getElementById("liveIndicator").className = "pf-status-indicator pf-status-indicator--down";
                document.getElementById("liveText").textContent = "Desconectado";
            }

            // 2. Health Check
            try {
                const res = await fetch("/health");
                if (res.ok) {
                    document.getElementById("healthIndicator").className = "pf-status-indicator pf-status-indicator--up";
                    document.getElementById("healthText").textContent = "Saudável";
                } else {
                    throw new Error();
                }
            } catch (e) {
                document.getElementById("healthIndicator").className = "pf-status-indicator pf-status-indicator--down";
                document.getElementById("healthText").textContent = "Erro na API";
            }

            // 3. Ready Check (Banco de dados)
            try {
                const res = await fetch("/ready");
                const data = await res.json();
                
                if (res.ok && data.database === "CONNECTED") {
                    document.getElementById("readyIndicator").className = "pf-status-indicator pf-status-indicator--up";
                    document.getElementById("readyText").textContent = "Conectado e Estável";
                } else {
                    document.getElementById("readyIndicator").className = "pf-status-indicator pf-status-indicator--down";
                    document.getElementById("readyText").textContent = "Erro de Conexão";
                }
            } catch (e) {
                document.getElementById("readyIndicator").className = "pf-status-indicator pf-status-indicator--down";
                document.getElementById("readyText").textContent = "Timeout / Desconectado";
            }
        }

        // Atualiza a cada 5 segundos
        setInterval(updateStatus, 5000);
        // Roda a primeira vez imediatamente
        updateStatus();
    </script>
</body>

</html>
